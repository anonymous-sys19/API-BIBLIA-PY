<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} — API Bíblica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ── Tokens de diseño ─────────────────────────────────── */
        :root {
            --bg-base:      #0d0f1a;
            --bg-surface:   #131629;
            --bg-card:      rgba(255,255,255,0.04);
            --bg-card-hov:  rgba(255,255,255,0.07);
            --border:       rgba(255,255,255,0.08);
            --border-focus: #6c63ff;
            --accent:       #6c63ff;
            --accent-2:     #a78bfa;
            --accent-glow:  rgba(108,99,255,0.35);
            --success:      #22c55e;
            --danger:       #ef4444;
            --warning:      #f59e0b;
            --text-1:       #f1f5f9;
            --text-2:       #94a3b8;
            --text-3:       #64748b;
            --radius:       12px;
            --radius-sm:    8px;
            --shadow:       0 4px 24px rgba(0,0,0,0.5);
            --shadow-glow:  0 0 20px var(--accent-glow);
            --transition:   0.2s ease;
            --header-h:     64px;
        }

        /* ── Reset + Base ─────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-base);
            color: var(--text-1);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Scrollbar ────────────────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* ── Header / Navbar ──────────────────────────────────── */
        .header {
            position: sticky; top: 0; z-index: 100;
            height: var(--header-h);
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            background: rgba(13,15,26,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .header-brand {
            display: flex; align-items: center; gap: 0.75rem;
            text-decoration: none;
        }
        .header-brand .logo-mark {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; font-weight: 700; color: #fff;
            box-shadow: var(--shadow-glow);
            flex-shrink: 0;
        }
        .header-brand .brand-text {
            display: flex; flex-direction: column; line-height: 1.1;
        }
        .header-brand .brand-name {
            font-size: 0.95rem; font-weight: 700; color: var(--text-1);
        }
        .header-brand .brand-sub {
            font-size: 0.65rem; font-weight: 500;
            color: var(--accent-2); letter-spacing: 0.08em; text-transform: uppercase;
        }

        /* hamburger (móvil) */
        .menu-toggle {
            display: none; flex-direction: column; gap: 5px;
            background: none; border: none; cursor: pointer; padding: 4px;
        }
        .menu-toggle span {
            display: block; width: 22px; height: 2px;
            background: var(--text-2); border-radius: 999px;
            transition: var(--transition);
        }

        .nav {
            display: flex; align-items: center; gap: 0.25rem;
        }
        .nav a {
            color: var(--text-2); text-decoration: none;
            padding: 0.45rem 0.9rem;
            border-radius: var(--radius-sm);
            font-size: 0.875rem; font-weight: 500;
            transition: var(--transition);
            display: flex; align-items: center; gap: 0.4rem;
            white-space: nowrap;
        }
        .nav a:hover  { color: var(--text-1); background: var(--bg-card-hov); }
        .nav a.active {
            color: var(--accent-2);
            background: rgba(108,99,255,0.15);
            border: 1px solid rgba(108,99,255,0.3);
        }
        .nav a svg { width: 15px; height: 15px; stroke-width: 2; }

        /* ── Layout ───────────────────────────────────────────── */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* ── Alertas / Flash ──────────────────────────────────── */
        .flash {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.875rem 1.25rem;
            border-radius: var(--radius-sm);
            font-size: 0.875rem; font-weight: 500;
            margin-bottom: 1.5rem;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from { transform: translateY(-8px); opacity: 0; }
            to   { transform: translateY(0);   opacity: 1; }
        }
        .flash-success { background: rgba(34,197,94,0.12);  border: 1px solid rgba(34,197,94,0.3);  color: #4ade80; }
        .flash-error   { background: rgba(239,68,68,0.12);  border: 1px solid rgba(239,68,68,0.3);  color: #f87171; }
        .flash-warning { background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3); color: #fbbf24; }

        /* ── Card ─────────────────────────────────────────────── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.75rem;
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }

        /* ── Page Header (dentro de .container) ──────────────── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.75rem;
        }
        .page-header-left h1 {
            font-size: 1.5rem; font-weight: 700; color: var(--text-1);
        }
        .page-header-left p {
            font-size: 0.8rem; color: var(--text-3); margin-top: 0.15rem;
        }

        /* ── Botones ──────────────────────────────────────────── */
        .btn {
            display: inline-flex; align-items: center; gap: 0.45rem;
            padding: 0.55rem 1.2rem;
            border-radius: var(--radius-sm);
            font-size: 0.85rem; font-weight: 600;
            text-decoration: none; border: none; cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }
        .btn svg { width: 15px; height: 15px; flex-shrink: 0; }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: #fff;
            box-shadow: 0 2px 12px var(--accent-glow);
        }
        .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
        .btn-ghost {
            background: transparent;
            color: var(--text-2);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { background: var(--bg-card-hov); color: var(--text-1); }
        .btn-danger {
            background: rgba(239,68,68,0.15);
            color: #f87171;
            border: 1px solid rgba(239,68,68,0.3);
        }
        .btn-danger:hover { background: rgba(239,68,68,0.25); }
        .btn-success {
            background: rgba(34,197,94,0.15);
            color: #4ade80;
            border: 1px solid rgba(34,197,94,0.3);
        }
        .btn-success:hover { background: rgba(34,197,94,0.25); }
        .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.78rem; }

        /* ── Tabla responsive ─────────────────────────────────── */
        .table-wrap { overflow-x: auto; border-radius: var(--radius-sm); }
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; min-width: 580px; }
        thead tr { border-bottom: 1px solid var(--border); }
        th {
            padding: 0.7rem 1rem;
            text-align: left;
            font-size: 0.72rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.07em;
            color: var(--text-3);
            white-space: nowrap;
        }
        td {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            color: var(--text-2);
            vertical-align: middle;
        }
        tbody tr { transition: var(--transition); }
        tbody tr:hover { background: var(--bg-card-hov); }
        tbody tr:last-child td { border-bottom: none; }

        .actions { display: flex; gap: 0.5rem; align-items: center; }

        /* ── Thumbnails ───────────────────────────────────────── */
        .logo-thumb {
            width: 36px; height: 36px;
            object-fit: cover; border-radius: 8px;
            border: 1px solid var(--border);
        }
        .video-thumb {
            width: 80px; height: 48px;
            object-fit: cover; border-radius: 6px;
            border: 1px solid var(--border);
        }

        /* ── Badge / Status ───────────────────────────────────── */
        .badge {
            display: inline-flex; align-items: center; gap: 0.3rem;
            padding: 0.2rem 0.6rem;
            border-radius: 999px; font-size: 0.72rem; font-weight: 600;
        }
        .badge::before {
            content: ''; width: 6px; height: 6px;
            border-radius: 50%; display: block;
        }
        .badge-online  { background: rgba(34,197,94,0.15); color: #4ade80; }
        .badge-online::before  { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
        .badge-offline { background: rgba(239,68,68,0.12); color: #f87171; }
        .badge-offline::before { background: #f87171; }

        /* ── Estado vacío ─────────────────────────────────────── */
        .empty-state {
            text-align: center; padding: 4rem 2rem;
            color: var(--text-3);
        }
        .empty-state .empty-icon {
            font-size: 3rem; margin-bottom: 1rem; display: block;
            opacity: 0.4;
        }
        .empty-state p { font-size: 0.9rem; }

        /* ── Formularios ──────────────────────────────────────── */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
        .form-grid .full-col { grid-column: 1 / -1; }
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .form-group label {
            font-size: 0.8rem; font-weight: 600;
            color: var(--text-2); letter-spacing: 0.02em;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-1);
            padding: 0.65rem 0.9rem;
            font-size: 0.875rem;
            font-family: inherit;
            width: 100%;
            transition: var(--transition);
            outline: none;
        }
        .form-group input::placeholder,
        .form-group select::placeholder { color: var(--text-3); }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--border-focus);
            background: rgba(108,99,255,0.06);
            box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
        }
        .form-group select option { background: var(--bg-surface); color: var(--text-1); }
        .form-group input[readonly] { opacity: 0.6; cursor: not-allowed; }

        .form-footer {
            display: flex; gap: 0.75rem; flex-wrap: wrap;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        /* ── Divider con texto ────────────────────────────────── */
        .section-title {
            font-size: 0.7rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--text-3);
            margin-bottom: 1rem;
        }

        /* ── Responsive ───────────────────────────────────────── */
        @media (max-width: 768px) {
            .menu-toggle { display: flex; }

            .nav {
                display: none;
                position: fixed;
                top: var(--header-h);
                left: 0; right: 0; bottom: 0;
                background: rgba(13,15,26,0.97);
                backdrop-filter: blur(20px);
                flex-direction: column;
                align-items: flex-start;
                padding: 1.5rem;
                gap: 0.25rem;
                border-top: 1px solid var(--border);
                overflow-y: auto;
                z-index: 99;
            }
            .nav.open { display: flex; }
            .nav a { width: 100%; padding: 0.75rem 1rem; font-size: 1rem; }

            .container { padding: 1.25rem 1rem; }
            .card { padding: 1.25rem; }
            .form-grid { grid-template-columns: 1fr; }
            .form-grid .full-col { grid-column: 1; }
            .page-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <!-- ── Header ─────────────────────────────────────────────── -->
    <header class="header">
        <a href="/admin/streams" class="header-brand">
            <div class="logo-mark">✝</div>
            <div class="brand-text">
                <span class="brand-name">API Bíblica</span>
                <span class="brand-sub">Panel Admin</span>
            </div>
        </a>

        <button class="menu-toggle" id="menuToggle" aria-label="Menú">
            <span></span><span></span><span></span>
        </button>

        <nav class="nav" id="mainNav">
            <a href="/admin/streams" class="{{ 'active' if active == 'streams' else '' }}">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 19V6l12-3v13M9 19c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm12-3c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2z"/>
                </svg>
                Radios
            </a>
            <a href="/admin/videos" class="{{ 'active' if active == 'videos' else '' }}">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                Videos
            </a>
        </nav>
    </header>

    <!-- ── Contenido principal ─────────────────────────────────── -->
    <main class="container">
        {% if flash %}
            <div class="flash flash-{{ flash_type }}">
                {% if flash_type == 'success' %}✓{% elif flash_type == 'error' %}✕{% else %}⚠{% endif %}
                {{ flash }}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <script>
        // Menú hamburguesa
        const toggle = document.getElementById('menuToggle');
        const nav    = document.getElementById('mainNav');
        toggle?.addEventListener('click', () => {
            nav.classList.toggle('open');
        });
        // Cerrar al hacer click en un link (móvil)
        nav?.querySelectorAll('a').forEach(a => {
            a.addEventListener('click', () => nav.classList.remove('open'));
        });
    </script>
</body>
</html>
